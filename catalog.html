<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luar Pratas - Catálogo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">

<div class="logo">Luar Pratas</div>

<div class="pesquisa">
<input type="text" id="pesquisa" placeholder="Pesquisar joia..." onkeyup="pesquisar()">
</div>

<div class="carrinho-icon" onclick="abrirCarrinho()">
🛒 <span id="contador">0</span>
</div>

</header>

<nav class="categorias">

<button onclick="filtrar('brinco')">Brincos</button>
<button onclick="filtrar('colar')">Colares</button>
<button onclick="filtrar('pulseira')">Pulseiras</button>
<button onclick="filtrar('anel')">Anéis</button>
<button onclick="filtrar('pingente')">Pingentes</button>
<button onclick="filtrar('personalizado')">Personalizados</button>
<button onclick="filtrar('masculino')">Linha Masculina</button>
<button onclick="filtrar('todos')">Todos</button>

</nav>

<div class="grade-produtos" id="produtos"></div>

<div class="carrinho-lateral" id="carrinho">

<h2>Seu Carrinho</h2>

<div id="listaCarrinho"></div>

<hr>

<p id="total">Total: R$ 0</p>

<button class="btn-enviar" onclick="enviarWhats()">Enviar Pedido no WhatsApp</button>

<button class="btn-fechar" onclick="fecharCarrinho()">Fechar</button>

</div>

<script src="carrinho.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  
  if (typeof filtrar === "function") {
    filtrar("todos");
  }

});
</script>
  <div id="modalZoom" class="modal-zoom">
  <span class="fechar">&times;</span>
  <img class="modal-img" id="imgZoom">
</div>

<style>
.modal-zoom {
  display: none;
  position: fixed;
  z-index: 9999;
  padding-top: 50px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
}

.modal-img {
  margin: auto;
  display: block;
  width: 90%;
  max-width: 500px;
  border-radius: 10px;
}

.fechar {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 35px;
  cursor: pointer;
}
</style>

<script>
const modal = document.getElementById("modalZoom");
const modalImg = document.getElementById("imgZoom");
const fechar = document.querySelector(".fechar");

// 🔥 só imagens das joias (IMPORTANTÍSSIMO)
document.querySelectorAll(".produto img").forEach(img => {
  img.addEventListener("click", function() {
    modal.style.display = "block";
    modalImg.src = this.src;
  });
});

fechar.addEventListener("click", () => {
  modal.style.display = "none";
});

modal.addEventListener("click", (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
});
</script>
</body>
</html>
